set -g set-clipboard on 
set -g allow-passthrough on
set -g extended-keys on
set -g mouse on
set -g mode-keys vi
set -g history-limit 100000

# Shift + enter
bind -n S-Enter send-keys -H 1b 5b 31 33 3b 32 75

# New windows open in same directory
bind c new-window -c "#{pane_current_path}"

# Reload config shortcut
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Copy to system clipboard
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# Status bar — Catppuccin Mocha
set -g status-position bottom
set -g status-interval 5
set -g status-right-length 120
set -g status-left-length 80

# Bar background
set -g status-style "bg=#1e1e2e fg=#cdd6f4"

# Session + path (left)
set -g status-left "#[bg=#cba6f7 fg=#1e1e2e bold] #S #[bg=#1e1e2e fg=#cba6f7]  #[fg=#89b4fa]#{pane_current_path} #[fg=#45475a] │ "

# Windows
set -g window-status-style "fg=#6c7086"
set -g window-status-format " #I:#W "
set -g window-status-current-style "bg=#fab387 fg=#1e1e2e bold"
set -g window-status-current-format " #I:#W "

# Branch + metrics (right)
set -g status-right "#[fg=#a6e3a1]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/  &/') #[fg=#45475a]│ #[fg=#f9e2af]  #(cat /proc/loadavg | awk '{print $1}') #[fg=#45475a]│#[fg=#f9e2af]  #(free -m | awk 'NR==2{printf \"%.0f%%\", $3*100/$2}') #[fg=#45475a]│#[fg=#f9e2af]  #(uptime -p | sed 's/up //') "
